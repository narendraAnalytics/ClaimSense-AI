# Requires 4 repo secrets: CONVEX_URL, CONVEX_DEPLOY_KEY, CONVEX_SITE_URL, BACKEND_UPLOAD_SECRET (see root CLAUDE.md CI/CD section)
name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: backend

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend.yml'
              - 'CLAUDE.md'

  test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - run: uv sync --frozen --dev

      - run: uv run pytest -q
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
          BACKEND_UPLOAD_SECRET: ${{ secrets.BACKEND_UPLOAD_SECRET }}
